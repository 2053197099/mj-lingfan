<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="MJ Lingfan command rules">
  <rect width="980" height="420" fill="#f8fafc"/>
  <text x="44" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#172033">默认命令生成规则</text>
  <text x="44" y="88" font-family="Arial, sans-serif" font-size="17" fill="#64748b">默认：Relax、尺寸 1:1、重复次数 1、发送间隔 10-30 秒</text>

  <rect x="44" y="122" width="270" height="86" rx="14" fill="#fff" stroke="#d8dee8"/>
  <text x="66" y="154" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#475569">提示词</text>
  <text x="66" y="188" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#172033">1</text>

  <path d="M336 165h95" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="458" y="122" width="478" height="86" rx="14" fill="#eff6ff" stroke="#93b4ff"/>
  <text x="480" y="154" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">最终发送到 Midjourney</text>
  <text x="480" y="188" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">1 --sref random --relax --ar 1:1</text>

  <rect x="44" y="242" width="270" height="86" rx="14" fill="#fff" stroke="#d8dee8"/>
  <text x="66" y="274" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#475569">后缀输入数字</text>
  <text x="66" y="308" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#172033">201824100</text>

  <path d="M336 285h95" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="458" y="242" width="478" height="86" rx="14" fill="#f0fdf4" stroke="#86efac"/>
  <text x="480" y="274" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">自动变成风格参考参数</text>
  <text x="480" y="308" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">--sref 201824100</text>

  <text x="44" y="370" font-family="Arial, sans-serif" font-size="16" fill="#64748b">如果你手动写了 --ar、--fast 或 --relax，插件会尽量避免重复追加同类参数。</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
